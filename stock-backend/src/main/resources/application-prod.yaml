spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
  cache:
    type: redis

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

ai:
  service:
    enabled: ${AI_SERVICE_ENABLED:true}
    url: ${AI_SERVICE_URL:http://ai-service:8000}
    internal-key: ${AI_INTERNAL_API_KEY}
  jobs:
    enabled: ${AI_JOBS_ENABLED:true}
    fixed-delay-ms: ${AI_JOBS_FIXED_DELAY_MS:900000}

stockpilot:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  owner:
    enabled: ${APP_OWNER_ENABLED:false}
    email: ${APP_OWNER_EMAIL:}
    password: ${APP_OWNER_PASSWORD:}
  billing:
    stripe-secret-key: ${STRIPE_SECRET_KEY}
    stripe-webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    success-url: ${BILLING_SUCCESS_URL}
    cancel-url: ${BILLING_CANCEL_URL}
    starter-price-id: ${STRIPE_PRICE_STARTER}
    pro-price-id: ${STRIPE_PRICE_PRO}
