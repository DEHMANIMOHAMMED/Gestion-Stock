services:
  postgres:
    image: postgres:16-alpine
    container_name: gestion-stock-postgres
    environment:
      POSTGRES_DB: gestion_stock
      POSTGRES_USER: gestion_stock
      POSTGRES_PASSWORD: gestion_stock
    ports:
      - "5432:5432"
    volumes:
      - gestion_stock_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestion_stock -d gestion_stock"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
    container_name: stockpilot-ai-service
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stockpilot-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - stockpilot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gestion_stock_postgres_data:
  stockpilot_redis_data:
